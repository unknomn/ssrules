  - RULE-SET,ssrules-AIResources,📚 AI Resources
  - RULE-SET,ssrules-AIIDE,💻 AI IDE
  # Custom direct & reject
  - RULE-SET,ssrules-Direct,🎯 全球直连
  - RULE-SET,ssrules-Reject,🛑 广告拦截
  # Local & unban
  - RULE-SET,LocalAreaNetwork,🎯 全球直连
  - RULE-SET,UnBan,🎯 全球直连
  # Ads
  - RULE-SET,BanAD,🛑 广告拦截
